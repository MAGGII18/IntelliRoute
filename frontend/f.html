<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>IntelliRoute : Smart Flight Path Optimization System</title>

    <link rel="stylesheet" href="s.css">

</head>

<body>

    <div class="mainBox">

        <div class="title">
            IntelliRoute : Smart Flight Path Optimization System
        </div>

        <div class="formArea">

            <div class="row">
                <span>Source Airport</span>
                <input type="text" placeholder="Enter source">
            </div>

            <div class="row">
                <span>Destination Airport</span>
                <input type="text" placeholder="Enter destination">
            </div>
            

            <div class="row">
                <span>Select Mode</span>

                <select>
                    <option>Minimum Cost</option>
                    <option>Minimum Time</option>
                    <option>Balanced Route</option>
                    <option>All Possible Routes</option>
                </select>
            </div>

            <div class="btnArea">
                <button>Search Route</button>
            </div>

        </div>

        <div class="outputBox">
            Result will show here
        </div>

    </div>

</body>

</html>
